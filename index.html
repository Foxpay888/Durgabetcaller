<!DOCTYPE html>
<html>
<head>
  <title>Call Manager PRO</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#141e30,#243b55,#0f2027);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      width: 95%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 
        0 10px 40px rgba(0,0,0,0.6),
        inset 0 0 10px rgba(255,255,255,0.1);
      text-align: center;
    }

    h2 {
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    #number {
      font-size: 28px;
      margin: 12px 0;
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      backdrop-filter: blur(10px);
    }

    input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    button {
      margin: 6px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      box-shadow: 
        0 6px 15px rgba(0,0,0,0.4),
        inset 0 1px 2px rgba(255,255,255,0.2);
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 8px 20px rgba(0,0,0,0.6),
        0 0 10px rgba(255,255,255,0.2);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.6);
    }

    .green { background: linear-gradient(45deg,#00c853,#69f0ae); }
    .red { background: linear-gradient(45deg,#d50000,#ff5252); }
    .blue { background: linear-gradient(45deg,#2962ff,#82b1ff); }
    .gray { background: rgba(120,120,120,0.3); }
    .yellow { background: linear-gradient(45deg,#ffab00,#ffd740); color:black; }

  </style>
</head>

<body>

<div class="container">

  <h2>📞 Call Manager PRO</h2>

  <div id="number">Number</div>

  <input type="file" id="file">

  <input type="text" id="sheetLink" placeholder="Google Sheet Link">
  <button class="blue" onclick="connectSheet()">🔗 Connect</button>

  <input type="text" id="feedback" placeholder="Enter feedback">

  <br>

  <button class="green" onclick="setFeedback('Interested')">👍</button>
  <button class="red" onclick="setFeedback('Not Interested')">❌</button>

  <br>

  <button class="gray" onclick="start()">Start</button>
  <button class="green" onclick="callNow()">📞</button>
  <button class="blue" onclick="waNow()">💬</button>

  <br>

  <input type="text" id="manualDate" placeholder="Enter Date (27/03/2026)">
  <button class="yellow" onclick="addDate()">📅 Add Date</button>

</div>

<script>
let numbers = [];
let index = 0;
let connectedSheet = "";

document.getElementById('file').addEventListener('change', function(e){
  let reader = new FileReader();
  reader.onload = function(e){
    numbers = e.target.result
      .split(/\r?\n|,|\s+/)
      .filter(n => n.length > 5)
      .map(n => "+91" + n.replace(/\D/g,""));

    alert("Loaded " + numbers.length);
  };
  reader.readAsText(e.target.files[0]);
});

function connectSheet(){
  connectedSheet = document.getElementById("sheetLink").value;
  alert("Connected ✅");
}

function start(){
  index = 0;
  show();
}

function show(){
  if(index >= numbers.length){
    document.getElementById("number").innerText = "Done";
    return;
  }
  document.getElementById("number").innerText = numbers[index];
}

function callNow(){
  location.href = "tel:" + numbers[index];
}

function waNow(){
  location.href = "https://wa.me/" + numbers[index].replace("+","");
}

function setFeedback(type){
  document.getElementById("feedback").value = type;
  saveData();
}

function saveData(){
  let feedback = document.getElementById("feedback").value;
  let mobile = numbers[index];

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://script.google.com/macros/s/AKfycbwHzy2fO5HPaRMvjO4oP4QtYiCFFCABxohNDTdtx7ALqCC9VHBPzs9ruvNPI9VLXQqzqg/exec");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: mobile,
    feedback: feedback
  }));

  index++;
  show();
}

function addDate(){
  let date = document.getElementById("manualDate").value;

  if(!date) return alert("Date daalo ❌");

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://script.google.com/macros/s/AKfycbwHzy2fO5HPaRMvjO4oP4QtYiCFFCABxohNDTdtx7ALqCC9VHBPzs9ruvNPI9VLXQqzqg/exec");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: "------ " + date + " ------",
    feedback: ""
  }));

  document.getElementById("manualDate").value = "";
  alert("Date Added ✅");
}
</script>

</body>
</html>
