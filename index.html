<!DOCTYPE html>
<html>
<head>
  <title>Call Manager PRO</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      position: fixed;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#141e30,#243b55,#0f2027);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 500px;
      transform: scale(1.1);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 
        0 10px 40px rgba(0,0,0,0.6),
        inset 0 0 10px rgba(255,255,255,0.1);
      text-align: center;
    }

    #number {
      font-size: 30px;
      margin: 12px 0;
      color: #00e5ff;
      text-shadow: 0 0 10px #00e5ff;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      margin: 6px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      backdrop-filter: blur(10px);
      box-shadow: 
        0 6px 15px rgba(0,0,0,0.4),
        inset 0 1px 2px rgba(255,255,255,0.2);
    }

    button:active {
      transform: translateY(2px);
    }

    .green { background: linear-gradient(45deg,#00c853,#69f0ae); }
    .red { background: linear-gradient(45deg,#d50000,#ff5252); }
    .blue { background: linear-gradient(45deg,#2962ff,#82b1ff); }
    .gray { background: rgba(120,120,120,0.3); }
    .yellow { background: linear-gradient(45deg,#ffab00,#ffd740); color:black; }

  </style>
</head>

<body>

<div class="container">

  <h2>📞 Call Manager PRO</h2>

  <div id="number">Load File</div>

  <input type="file" id="file">

  <input type="text" id="sheetLink" placeholder="Google Sheet Link">
  <button class="blue" onclick="connectSheet()">🔗 Connect</button>

  <input type="text" id="feedback" placeholder="Enter feedback">

  <br>

  <button class="green" onclick="setFeedback('Interested')">👍</button>
  <button class="red" onclick="setFeedback('Not Interested')">❌</button>

  <br>

  <button class="gray" onclick="start()">Start</button>
  <button class="green" onclick="callNow()">📞 Call</button>
  <button class="blue" onclick="waNow()">💬 WhatsApp</button>

  <br>

  <button class="yellow" onclick="addDate()">📅 Add Date</button>

</div>

<script>

// ✅ LOAD FROM STORAGE
let numbers = JSON.parse(localStorage.getItem("numbers")) || [];
let index = parseInt(localStorage.getItem("index")) || 0;
let connectedSheet = localStorage.getItem("sheet") || "";

// 📂 FILE LOAD
document.getElementById('file').addEventListener('change', function(e){
  let reader = new FileReader();
  reader.onload = function(e){
    numbers = e.target.result
      .split(/\r?\n|,|\s+/)
      .filter(n => n.length > 5)
      .map(n => "+91" + n.replace(/\D/g,""));

    localStorage.setItem("numbers", JSON.stringify(numbers));
    localStorage.setItem("index", 0);

    index = 0;

    alert("Saved " + numbers.length + " numbers");
    show();
  };
  reader.readAsText(e.target.files[0]);
});

// 🔗 CONNECT SHEET
function connectSheet(){
  connectedSheet = document.getElementById("sheetLink").value;
  localStorage.setItem("sheet", connectedSheet);
  alert("Connected ✅");
}

// ▶ START (resume)
function start(){
  show();
}

// 📱 SHOW NUMBER
function show(){
  if(numbers.length === 0){
    document.getElementById("number").innerText = "Load File First";
    return;
  }

  if(index >= numbers.length){
    document.getElementById("number").innerText = "Done ✅";
    return;
  }

  document.getElementById("number").innerText = numbers[index];
}

// 📞 CALL
function callNow(){
  if(numbers[index]) location.href = "tel:" + numbers[index];
}

// 💬 WHATSAPP
function waNow(){
  if(numbers[index]) location.href = "https://wa.me/" + numbers[index].replace("+","");
}

// 👍 FEEDBACK
function setFeedback(type){
  document.getElementById("feedback").value = type;
  saveData();
}

// 💾 SAVE DATA
function saveData(){
  let feedback = document.getElementById("feedback").value;
  let mobile = numbers[index];

  let now = new Date();
  let date = now.toLocaleDateString("en-GB");
  let time = now.toLocaleTimeString();

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "YOUR_SCRIPT_URL_HERE");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: mobile,
    feedback: feedback,
    date: date,
    time: time
  }));

  index++;
  localStorage.setItem("index", index);

  show();
}

// 📅 ADD DATE BUTTON
function addDate(){
  let now = new Date();
  let date = now.toLocaleDateString("en-GB");

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "YOUR_SCRIPT_URL_HERE");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: "---- DATE ----",
    feedback: "",
    date: date,
    time: ""
  }));

  alert("Date Added ✅");
}

// 🔄 AUTO RESUME
window.onload = function(){
  if(numbers.length > 0){
    show();
  }
};

</script>

</body>
</html>
