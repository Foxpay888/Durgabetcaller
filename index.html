<!DOCTYPE html>
<html>
<head>
  <title>Durga Caller PRO</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      position: fixed;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#141e30,#243b55,#0f2027);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 500px;
      transform: scale(1.1);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
    }

    #number {
      font-size: 30px;
      margin: 12px 0;
      color: #00e5ff;
    }

    #progress {
      font-size: 14px;
      opacity: 0.7;
    }

    .progress-bar {
      width: 90%;
      height: 10px;
      margin: 10px auto;
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
    }

    #progressFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#00e5ff,#00c853);
      box-shadow: 0 0 10px #00e5ff;
      transition: 0.4s;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      margin: 6px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .green { background: linear-gradient(45deg,#00c853,#69f0ae); }
    .red { background: linear-gradient(45deg,#d50000,#ff5252); }
    .blue { background: linear-gradient(45deg,#2962ff,#82b1ff); }
    .gray { background: rgba(120,120,120,0.3); }
    .yellow { background: linear-gradient(45deg,#ffab00,#ffd740); color:black; }

  </style>
</head>

<body>

<div class="container">

  <h2>📞 DURGABET CALLER PRO</h2>

  <div id="number">Load File</div>
  <div id="progress">0 / 0</div>

  <div class="progress-bar">
    <div id="progressFill"></div>
  </div>

  <input type="file" id="file">

  <input type="text" id="sheetLink" placeholder="Google Sheet Link">
  <button class="blue" onclick="connectSheet()">🔗 Connect</button>

  <input type="text" id="feedback" placeholder="Enter feedback">

  <br>

  <button class="green" onclick="setFeedback('Interested')">Intreseted</button>
  <button class="red" onclick="setFeedback('Not Interested')">❌</button>

  <br>

  <button class="gray" onclick="prev()">⏮ Prev</button>
  <button class="gray" onclick="start()">Start</button>
  <button class="gray" onclick="next()">Next ⏭</button>

  <br>

  <button class="green" onclick="callNow()">📞 Call</button>
  <button class="blue" onclick="waNow()">💬 WhatsApp</button>

  <br>

  <button class="yellow" onclick="addDate()">📅 Add Date</button>

</div>

<script>

let numbers = JSON.parse(localStorage.getItem("numbers")) || [];
let index = parseInt(localStorage.getItem("index")) || 0;
let connectedSheet = localStorage.getItem("sheet") || "";

// FILE LOAD
document.getElementById('file').addEventListener('change', function(e){
  let file = e.target.files[0];

  let reader = new FileReader();
  reader.onload = function(e){

    if(file.name.endsWith(".xlsx")){
      let data = new Uint8Array(e.target.result);
      let workbook = XLSX.read(data, {type: 'array'});
      let sheet = workbook.Sheets[workbook.SheetNames[0]];
      let json = XLSX.utils.sheet_to_json(sheet, {header:1});

      numbers = [];
      json.forEach(row=>{
        row.forEach(cell=>{
          let num = String(cell).replace(/\D/g,'');
          if(num.length >= 10){
            numbers.push("+91" + num.slice(-10));
          }
        });
      });

    } else {
      numbers = e.target.result
        .split(/\r?\n|,|\s+/)
        .filter(n => n.length > 5)
        .map(n => "+91" + n.replace(/\D/g,""));
    }

    localStorage.setItem("numbers", JSON.stringify(numbers));
    localStorage.setItem("index", 0);
    index = 0;

    alert("Loaded " + numbers.length);
    show();
  };

  if(file.name.endsWith(".xlsx")){
    reader.readAsArrayBuffer(file);
  } else {
    reader.readAsText(file);
  }

});

// CONNECT SHEET
function connectSheet(){
  connectedSheet = document.getElementById("sheetLink").value;
  localStorage.setItem("sheet", connectedSheet);
  alert("Connected ✅");
}

// SHOW
function show(){
  if(numbers.length === 0){
    document.getElementById("number").innerText = "Load File First";
    document.getElementById("progress").innerText = "0 / 0";
    return;
  }

  if(index >= numbers.length){
    document.getElementById("number").innerText = "Done ✅";
    document.getElementById("progress").innerText = numbers.length + " / " + numbers.length;
    document.getElementById("progressFill").style.width = "100%";
    return;
  }

  document.getElementById("number").innerText = numbers[index];
  updateProgress();
}

// PROGRESS
function updateProgress(){
  let total = numbers.length;
  let current = total === 0 ? 0 : index + 1;

  if(index >= total) current = total;

  document.getElementById("progress").innerText = current + " / " + total;

  let percent = total === 0 ? 0 : (current / total) * 100;
  document.getElementById("progressFill").style.width = percent + "%";
}

// NAV
function next(){
  if(index < numbers.length - 1){
    index++;
    localStorage.setItem("index", index);
    show();
  }
}

function prev(){
  if(index > 0){
    index--;
    localStorage.setItem("index", index);
    show();
  }
}

function start(){ show(); }

function callNow(){ if(numbers[index]) location.href = "tel:" + numbers[index]; }

function waNow(){ if(numbers[index]) location.href = "https://wa.me/" + numbers[index].replace("+",""); }

function setFeedback(type){
  document.getElementById("feedback").value = type;
  saveData();
}

// SAVE
function saveData(){
  let feedback = document.getElementById("feedback").value;
  let mobile = numbers[index];

  let now = new Date();
  let date = now.toLocaleDateString("en-GB");
  let time = now.toLocaleTimeString();

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://script.google.com/macros/s/AKfycbxQtYKwb2lSSkE_Dd0iKSppTUkBaYnRLVEE7CUCMvdmc30iLAHBntw2GE33UsKUa3ns/exec");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: mobile,
    feedback: feedback,
    date: date,
    time: time
  }));

  next();
}

// DATE
function addDate(){
  let now = new Date();
  let date = now.toLocaleDateString("en-GB");

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "https://script.google.com/macros/s/AKfycbxQtYKwb2lSSkE_Dd0iKSppTUkBaYnRLVEE7CUCMvdmc30iLAHBntw2GE33UsKUa3ns/exec");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: "---- DATE ----",
    feedback: "",
    date: date,
    time: ""
  }));

  alert("Date Added ✅");
}

// AUTO LOAD
window.onload = function(){
  if(numbers.length > 0){
    show();
  }
};

</script>

</body>
</html>
