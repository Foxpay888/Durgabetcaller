<!DOCTYPE html>
<html>
<head>
  <title>Call Manager PRO</title>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <!-- ✅ XLSX LIBRARY -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      position: fixed;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#141e30,#243b55,#0f2027);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 500px;
      transform: scale(1.1);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
    }

    #number {
      font-size: 30px;
      margin: 12px 0;
      color: #00e5ff;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      margin: 6px;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .green { background: linear-gradient(45deg,#00c853,#69f0ae); }
    .red { background: linear-gradient(45deg,#d50000,#ff5252); }
    .blue { background: linear-gradient(45deg,#2962ff,#82b1ff); }
    .gray { background: rgba(120,120,120,0.3); }
    .yellow { background: linear-gradient(45deg,#ffab00,#ffd740); color:black; }

  </style>
</head>

<body>

<div class="container">

  <h2> DURGABET Manager PRO</h2>

  <div id="number">Load File</div>

  <input type="file" id="file">

  <input type="text" id="sheetLink" placeholder="Google Sheet Link">
  <button class="blue" onclick="connectSheet()">🔗 Connect</button>

  <input type="text" id="feedback" placeholder="Enter feedback">

  <br>

  <button class="green" onclick="setFeedback('Interested')">👍</button>
  <button class="red" onclick="setFeedback('Not Interested')">❌</button>

  <br>

  <button class="gray" onclick="prev()">⏮ Prev</button>
  <button class="gray" onclick="start()">Start</button>
  <button class="gray" onclick="next()">Next ⏭</button>

  <br>

  <button class="green" onclick="callNow()">📞 Call</button>
  <button class="blue" onclick="waNow()">💬 WhatsApp</button>

  <br>

  <button class="yellow" onclick="addDate()">📅 Add Date</button>

</div>

<script>

// STORAGE
let numbers = JSON.parse(localStorage.getItem("numbers")) || [];
let index = parseInt(localStorage.getItem("index")) || 0;
let connectedSheet = localStorage.getItem("sheet") || "";

// 📂 FILE LOAD (FIXED XLSX)
document.getElementById('file').addEventListener('change', function(e){
  let file = e.target.files[0];

  if(file.name.endsWith(".xlsx")){
    let reader = new FileReader();
    reader.onload = function(e){
      let data = new Uint8Array(e.target.result);
      let workbook = XLSX.read(data, {type: 'array'});
      let sheet = workbook.Sheets[workbook.SheetNames[0]];
      let json = XLSX.utils.sheet_to_json(sheet, {header:1});

      numbers = [];

      json.forEach(row => {
        row.forEach(cell => {
          let num = String(cell).replace(/\D/g,'');
          if(num.length >= 10){
            numbers.push("+91" + num.slice(-10));
          }
        });
      });

      saveNumbers();
    };
    reader.readAsArrayBuffer(file);
  } else {
    // normal text file
    let reader = new FileReader();
    reader.onload = function(e){
      numbers = e.target.result
        .split(/\r?\n|,|\s+/)
        .filter(n => n.length > 5)
        .map(n => "+91" + n.replace(/\D/g,""));
      saveNumbers();
    };
    reader.readAsText(file);
  }
});

function saveNumbers(){
  localStorage.setItem("numbers", JSON.stringify(numbers));
  localStorage.setItem("index", 0);
  index = 0;
  alert("Loaded " + numbers.length + " numbers");
  show();
}

// SHEET CONNECT
function connectSheet(){
  connectedSheet = document.getElementById("sheetLink").value;
  localStorage.setItem("sheet", connectedSheet);
  alert("Connected ✅");
}

// SHOW
function show(){
  if(numbers.length === 0){
    document.getElementById("number").innerText = "Load File First";
    return;
  }
  if(index >= numbers.length){
    document.getElementById("number").innerText = "Done ✅";
    return;
  }
  document.getElementById("number").innerText = numbers[index];
}

// NAVIGATION
function next(){
  if(index < numbers.length - 1){
    index++;
    localStorage.setItem("index", index);
    show();
  }
}

function prev(){
  if(index > 0){
    index--;
    localStorage.setItem("index", index);
    show();
  }
}

// START
function start(){
  show();
}

// CALL / WA
function callNow(){
  if(numbers[index]) location.href = "tel:" + numbers[index];
}

function waNow(){
  if(numbers[index]) location.href = "https://wa.me/" + numbers[index].replace("+","");
}

// FEEDBACK
function setFeedback(type){
  document.getElementById("feedback").value = type;
  saveData();
}

// SAVE
function saveData(){
  let feedback = document.getElementById("feedback").value;
  let mobile = numbers[index];

  let now = new Date();
  let date = now.toLocaleDateString("en-GB");
  let time = now.toLocaleTimeString();

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "YOUR_SCRIPT_URL_HERE");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: mobile,
    feedback: feedback,
    date: date,
    time: time
  }));

  next();
}

// DATE BUTTON
function addDate(){
  let now = new Date();
  let date = now.toLocaleDateString("en-GB");

  var xhr = new XMLHttpRequest();
  xhr.open("POST", "YOUR_SCRIPT_URL_HERE");

  xhr.send(JSON.stringify({
    sheetUrl: connectedSheet,
    mobile: "---- DATE ----",
    feedback: "",
    date: date,
    time: ""
  }));

  alert("Date Added ✅");
}

// AUTO RESUME
window.onload = function(){
  if(numbers.length > 0){
    show();
  }
};

</script>

</body>
</html>
